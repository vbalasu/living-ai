resources:
  apps:
    living_ai_app:
      name: ${var.app_name}
      description: "Living AI agent (${var.agent_name}) on Databricks Apps."
      source_code_path: ../src
      resources:
        - name: config-volume
          description: "Config dir: identity, goals, learnings, episodes"
          uc_securable:
            securable_full_name: ${resources.volumes.config_volume.id}
            securable_type: VOLUME
            permission: WRITE_VOLUME
        - name: workspace-volume
          description: "Working files: voice cache, vision cache, scratch"
          uc_securable:
            securable_full_name: ${resources.volumes.workspace_volume.id}
            securable_type: VOLUME
            permission: WRITE_VOLUME
        - name: llm-endpoint
          description: "Serving endpoint used for cognition (FMAPI or external model)"
          serving_endpoint:
            name: ${var.llm_endpoint}
            permission: CAN_QUERY
        - name: telegram-bot-token
          description: "Telegram bot token"
          secret:
            scope: ${var.secrets_scope}
            key: telegram_bot_token
            permission: READ
        - name: telegram-user-handle
          description: "Primary Telegram user handle"
          secret:
            scope: ${var.secrets_scope}
            key: telegram_primary_user_handle
            permission: READ
        - name: telegram-webhook-secret
          description: "Secret token for verifying Telegram webhooks"
          secret:
            scope: ${var.secrets_scope}
            key: telegram_webhook_secret
            permission: READ
