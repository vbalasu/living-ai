resources:
  jobs:
    setup_tables:
      name: living-ai-setup-tables
      description: "One-time idempotent DDL for ${var.agent_name}'s Lakebase tables. Re-run safe."
      tasks:
        - task_key: create_tables
          notebook_task:
            notebook_path: ../sql/setup_notebook.py
            base_parameters:
              instance_name: ${resources.database_instances.living_ai_db.name}
              app_sp_client_id: ${resources.apps.living_ai_app.service_principal_client_id}
